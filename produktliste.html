<!doctype html>
<html lang="da">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FASHN</title>
    <script src="js/produclist.js" defer></script>
  </head>
  <body>
    <header>
      <nav class="headernav">
        <a href="index.html">
          <img
            src="imgs/logo.svg"
            alt="Logo"
            width="200"
            height="100"
            class="logo"
          />
        </a>
        <a class="navknap" href="">Categories</a>
        <a class="navknap" href="">Brands</a>
        <a class="navknap" href="">Seasons</a>
      </nav>
    </header>
    <main>
      <h2 class="produclist-h2"></h2>
      <div class="filter-buttons" id="filter">
        <button class="filterbutton">All</button>
        <button class="filterbutton">Unisex</button>
        <button class="filterbutton">Women</button>
        <button class="filterbutton">Men</button>
      </div>
      <div class="sorter-buttons" id="sorter">
        <button class="filterbutton" data-price="acc">Pris: Lav-Høj</button>
        <button class="filterbutton" data-price="dec">Pris: Høj-lav</button>
        <button class="filterbutton" data-text="az">A-Z</button>
        <button class="filterbutton" data-text="za">Z-A</button>
      </div>
      <section class="produktlist-grid"></section>
    </main>
    <footer>
      <nav class="footernav">
        <a class="navknap" href="">Categories</a>
        <a class="navknap" href="">Brands</a>
        <a class="navknap" href="">Seasons</a>
      </nav>
    </footer>
  </body>
</html>
